<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로스트아크 모바일 가변폰트 테스트</title>
    <!-- Use our script -->
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js" charset="utf-8"></script>
    <script type="module" src="script.js" charset="utf-8" defer></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Small overrides to hide landing UI not needed for the pre-loaded font */
        #landing {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="previewFont"></div> <!-- Exact structure from typeTester -->
    <main id="content" class="flex">
        <div id="landing" class="flex">
            <!-- Hidden by default via CSS but kept for DOM compatibility if needed -->
        </div>

        <!-- We will inject the control-bar dynamically via script, just like typeTester does -->
        <!-- Moved font-preview below the control-bar logic so flex order puts controls on the left -->
        <div id="font-preview" class="flex">
            <pre id="userText" spellcheck="false">수상한 움직임
경비병 벅과 대화하기
부엌 곁 팥 솥 앞 풀숲
유쾌한 쳇바퀴와 얘네의
예쁜 야외 휴양 요리길</pre>
        </div>
    </main>
</body>

</html>
